spring:
  application:
    name: rei
  datasource:
    url: jdbc:sqlite:${REI_MEMORY_DIR:./target}/memory.db
  ai:
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always
    ollama:
      base-url: ${REI_OLLAMA_BASE_URL:http://host.docker.internal:11434}
      chat:
        options:
          model: qwen3.5:9b
          temperature: 0.7
