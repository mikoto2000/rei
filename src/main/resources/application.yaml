spring:
  application:
    name: rei
  main:
    banner-mode: off
  ai:
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always
    openai:
      # base-url: ${REI_OPENAI_BASE_URL:https://api.openai.com}
      base-url: ${REI_OPENAI_BASE_URL:http://192.168.1.50:11434}
      api-key: ${REI_OPENAI_API_KEY:dummy-key}
      chat:
        options:
          # model: ${REI_OPENAI_CHAT_MODEL:gpt-5.4}
          model: ${REI_OPENAI_CHAT_MODEL:qwen3.5:122b}
          temperature: 0.3
      embedding:
        options:
          # model: ${REI_OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
          model: ${REI_OPENAI_EMBEDDING_MODEL:qwen3-embedding:8b}
    model:
      chat: openai
      embedding: openai
    mcp:
      client:
        enabled: ${REI_MCP_ENABLED:false}
        type: SYNC
        initialized: true
        request-timeout: 20s
        toolcallback:
          enabled: true
        stdio:
          servers-configuration: ${REI_MCP_STDIO_SERVERS_CONFIG:file:.rei/mcp-servers.json}
  devtools:
    restart:
      enabled: false
rei:
  openai:
    round-robin-enabled: ${REI_OPENAI_ROUND_ROBIN_ENABLED:false}
    base-urls: ${REI_OPENAI_BASE_URLS:}
  core:
    system-prompt: ${REI_AI_SYSTEM_PROMPT:classpath:/system-prompt.md}
    chat-memory-max-messages: ${REI_CHAT_MEMORY_MAX_MESSAGES:100}
  google:
    application-name: Rei
    credentials-path: ${REI_GOOGLE_CREDENTIALS_PATH:.rei/google-credentials.json}
    tokens-directory: ${REI_GOOGLE_TOKENS_DIR:.rei/google-tokens}
    calendar:
      enabled: ${REI_GOOGLE_CALENDAR_ENABLED:false}
      default-calendar-id: ${REI_GOOGLE_CALENDAR_DEFAULT_CALENDAR_ID:primary}
      time-zone: ${REI_GOOGLE_CALENDAR_TIME_ZONE:}
    task:
      enabled: ${REI_GOOGLE_TASK_ENABLED:true}
  web-search:
    enabled: ${REI_WEB_SEARCH_ENABLED:true}
    timeout-seconds: ${REI_WEB_SEARCH_TIMEOUT_SECONDS:10}
    max-results: ${REI_WEB_SEARCH_MAX_RESULTS:5}
    providers:
      - name: duckduckgo
        base-url: ${REI_WEB_SEARCH_DUCKDUCKGO_BASE_URL:https://html.duckduckgo.com/html/}
  interest:
    enabled: ${REI_INTEREST_ENABLED:false}
    lookback-days: ${REI_INTEREST_LOOKBACK_DAYS:7}
    message-limit: ${REI_INTEREST_MESSAGE_LIMIT:200}
    min-score: ${REI_INTEREST_MIN_SCORE:0.6}
    max-topics: ${REI_INTEREST_MAX_TOPICS:3}
    recent-hours: ${REI_INTEREST_RECENT_HOURS:24}
    vector-top-k: ${REI_INTEREST_VECTOR_TOP_K:3}
    web-top-k: ${REI_INTEREST_WEB_TOP_K:5}
    cron: ${REI_INTEREST_CRON:0 0 7 * * *}
    notification-enabled: ${REI_INTEREST_NOTIFICATION_ENABLED:false}
    notification-cron: ${REI_INTEREST_NOTIFICATION_CRON:0 0 12 * * *}
  feed:
    briefing-max-items: ${REI_FEED_BRIEFING_MAX_ITEMS:3}
    cron: ${REI_FEED_CRON:0 0 4 * * *}
  vector-document:
    chunk-size: ${REI_VECTOR_DOCUMENT_CHUNK_SIZE:512}
    chunk-overlap: ${REI_VECTOR_DOCUMENT_CHUNK_OVERLAP:64}
  sqlite-vec:
    version: ${REI_SQLITE_VEC_VERSION:0.1.9}
    auto-download: ${REI_SQLITE_VEC_AUTO_DOWNLOAD:true}
    cache-dir: ${REI_SQLITE_VEC_CACHE_DIR:${user.dir}/.rei/extensions/sqlite-vec}
    extension-path: ${REI_SQLITE_VEC_EXTENSION_PATH:}
    release-base-url: ${REI_SQLITE_VEC_RELEASE_BASE_URL:https://github.com/asg017/sqlite-vec/releases/download}
  bluesky:
    enabled: ${REI_BLUESKY_ENABLED:false}
    handle: ${REI_BLUESKY_HANDLE:}
    app-password: ${REI_BLUESKY_APP_PASSWORD:}
    max-post-length: ${REI_BLUESKY_MAX_POST_LENGTH:300}
    reply:
      enabled: ${REI_BLUESKY_REPLY_ENABLED:false}
      dry-run: ${REI_BLUESKY_REPLY_DRY_RUN:false}
      check-interval-seconds: ${REI_BLUESKY_REPLY_CHECK_INTERVAL_SECONDS:300}
      fetch-limit: ${REI_BLUESKY_REPLY_FETCH_LIMIT:30}
      exclude-replies: ${REI_BLUESKY_REPLY_EXCLUDE_REPLIES:true}
      exclude-reposts: ${REI_BLUESKY_REPLY_EXCLUDE_REPOSTS:true}
      max-post-age-minutes: ${REI_BLUESKY_REPLY_MAX_POST_AGE_MINUTES:120}
  memory:
    enabled: ${REI_MEMORY_ENABLED:true}
    auto-trigger-message-threshold: ${REI_MEMORY_AUTO_TRIGGER_MSG_THRESHOLD:20}
    auto-trigger-context-percent: ${REI_MEMORY_AUTO_TRIGGER_CTX_PERCENT:80}
    search-max-results: ${REI_MEMORY_SEARCH_MAX_RESULTS:10}
    search-max-injected: ${REI_MEMORY_SEARCH_MAX_INJECTED:3}
    summarize-max-length: ${REI_MEMORY_SUMMARIZE_MAX_LENGTH:2000}
    conflict-timeout-seconds: ${REI_MEMORY_CONFLICT_TIMEOUT_SECONDS:60}
    expiry:
      short-term-days: ${REI_MEMORY_EXPIRY_SHORT_TERM_DAYS:30}
      long-term-days: ${REI_MEMORY_EXPIRY_LONG_TERM_DAYS:365}

logging:
  file:
    name: ${REI_LOG_FILE:${user.dir}/.rei/rei.log}
  level:
    dev.mikoto2000.rei.bluesky: DEBUG
